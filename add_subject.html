<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Subject</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow p-4">
                <h3 class="text-center mb-3">Add Subject</h3>
                <form method="POST">
                    <div class="mb-3">
                        <input type="text" name="subject_name" class="form-control" placeholder="Subject Name" required>
                    </div>
                    <div class="mb-3">
                        <input type="text" name="subject_code" class="form-control" placeholder="Subject Code" required>
                    </div>
                    <div class="mb-3">
                        <input type="number" name="credit" class="form-control" placeholder="Credit" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Add Subject</button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
