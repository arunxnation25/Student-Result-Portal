<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload Marks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h3 class="mb-4">Upload Marks</h3>
    <form method="POST">
        <div class="mb-3">
            <label>Select Student</label>
            <select class="form-select" name="student_id" required>
                {% for student in students %}
                    <option value="{{ student['student_id'] }}">{{ student['name'] }} ({{ student['roll_no'] }})</option>
                {% endfor %}
            </select>
        </div>

        <table class="table table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>Subject</th>
                    <th>Internal (30)</th>
                    <th>Theory (70)</th>
                </tr>
            </thead>
            <tbody>
                {% for subject in subjects %}
                <tr>
                    <td>{{ subject['subject_name'] }} ({{ subject['subject_code'] }})</td>
                    <td><input type="number" name="internal_{{ subject['subject_id'] }}" max="30" min="0" class="form-control" required></td>
                    <td><input type="number" name="theory_{{ subject['subject_id'] }}" max="70" min="0" class="form-control" required></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button type="submit" class="btn btn-primary">Upload Marks</button>
    </form>
</div>
</body>
</html>
